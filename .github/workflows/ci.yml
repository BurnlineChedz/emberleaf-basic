name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Provide a build-time placeholder so Next.js can compile without
          # the real secret. This key is never used to call Stripe — it only
          # satisfies the env var check during `next build`. Set the real key
          # in your hosting environment (e.g. Vercel project settings).
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || 'sk_test_00000000000000000000000000000000000000000000000000' }}
          NEXT_PUBLIC_APP_URL: https://example.com

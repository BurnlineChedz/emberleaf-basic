<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 390" fill="none">
  <!-- Outer hexagon (pointy-top) -->
  <polygon
    points="150,18 258,78 258,198 150,258 42,198 42,78"
    fill="none" stroke="#0a0a0a" stroke-width="10" stroke-linejoin="round"/>
  <!-- Inner hexagon -->
  <polygon
    points="150,40 238,91 238,187 150,238 62,187 62,91"
    fill="none" stroke="#0a0a0a" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- E — left spine -->
  <rect x="80" y="86" width="22" height="144" fill="#0a0a0a"/>
  <!-- E — top bar -->
  <rect x="102" y="86" width="70" height="22" fill="#0a0a0a"/>
  <!-- E — middle bar -->
  <rect x="102" y="142" width="54" height="20" fill="#0a0a0a"/>

  <!-- L — right spine -->
  <rect x="178" y="86" width="22" height="144" fill="#0a0a0a"/>

  <!-- Shared bottom bar (E bottom + L bottom) -->
  <rect x="80" y="208" width="120" height="22" fill="#0a0a0a"/>

  <!-- EMBERLEAF -->
  <text
    x="150" y="308"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="34"
    letter-spacing="1.5"
    fill="#0a0a0a">EMBERLEAF</text>

  <!-- LASERWORKS -->
  <text
    x="150" y="348"
    text-anchor="middle"
    font-family="Arial, 'Helvetica Neue', sans-serif"
    font-weight="400"
    font-size="17"
    letter-spacing="8"
    fill="#0a0a0a">LASERWORKS</text>
</svg>
